name: Publish to PyPI

on:
  release:
    types: [published]   # triggers when you publish a GitHub Release

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write    # required for trusted publishing (no API token needed)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build distribution
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no PYPI_API_TOKEN secret needed.
        # Set up at: https://pypi.org/manage/account/publishing/
        # Publisher: GitHub  Repo: sycekosint/mcp  Workflow: publish.yml
